name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24]
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run secret:scan
      - run: npm run check
      - run: npm run build
      - run: |
          failed=0
          for f in test/*.test.mjs; do
            echo ""
            echo "========================================"
            echo "Running: $f"
            echo "========================================"
            if ! node --test --test-timeout=120000 "$f"; then
              echo "FAILED: $f"
              failed=1
            fi
          done
          exit $failed
      - run: npm run audit:package
