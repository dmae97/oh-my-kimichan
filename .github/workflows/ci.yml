name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24]
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm rebuild
      - run: npm run lint
      - run: npm run secret:scan
      - run: npm run check
      - run: npm run build
      - run: |
          set -o pipefail
          node --test --test-timeout=120000 --test-concurrency=1 test/*.test.mjs 2>&1 | tee test-output.txt
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-output-${{ matrix.os }}-node${{ matrix.node-version }}
          path: test-output.txt
      - run: npm run audit:package
