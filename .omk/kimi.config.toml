# oh-my-kimichan generated Kimi config
# 생명주기 hook 설정

[[hooks]]
event = "PreToolUse"
matcher = "Shell"
command = ".omk/hooks/pre-shell-guard.sh"
timeout = 5

[[hooks]]
event = "PreToolUse"
matcher = "WriteFile|StrReplaceFile"
command = ".omk/hooks/protect-secrets.sh"
timeout = 5

[[hooks]]
event = "PostToolUse"
matcher = "WriteFile|StrReplaceFile"
# post-format.sh runs formatting (prettier, rustfmt) on the modified file only.
command = ".omk/hooks/post-format.sh"
timeout = 20

[[hooks]]
event = "Stop"
# stop-verify.sh runs the full quality gate suite (lint, typecheck, test, build)
# before allowing the session to end. It detects package manager by lockfile
# and skips missing scripts gracefully.
command = ".omk/hooks/stop-verify.sh"
timeout = 300
